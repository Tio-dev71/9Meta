name: Release 9Meta

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish desktop apps
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            command: npm run build:mac -- --publish always
          - os: windows-latest
            command: npx electron-builder --win --publish always

    runs-on: ${{ matrix.os }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: 'true'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version v$TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Create GitHub release if missing
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Build and publish artifacts
        run: ${{ matrix.command }}
