<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="description"
    content="9Meta - Quản lý đa tài khoản Zalo, Messenger, Fanpage, Telegram, WhatsApp trên Desktop.">
  <title>9Meta</title>
  <style>
    :root {
      --sidebar: 56px;
      --blue: #0a84ff;
      --glass: rgba(18, 18, 24, .72);
      --line: rgba(255, 255, 255, .09);
    }

    * {
      box-sizing: border-box;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0d0f14;
      color: white;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body.light-mode {
      background: #f3f6fb;
      color: #151922;
    }

    #sidebar {
      width: var(--sidebar);
      height: 100%;
      background: linear-gradient(180deg, rgba(20, 22, 32, .86), rgba(8, 10, 16, .78));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0 10px;
      z-index: 100;
      position: relative;
      box-shadow: 4px 0 26px rgba(0, 0, 0, .28);
    }

    body.light-mode #sidebar {
      background: rgba(255, 255, 255, .82);
      border-right: 1px solid rgba(0, 0, 0, .06);
      box-shadow: 4px 0 22px rgba(30, 50, 90, .08);
    }

    #profiles-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 10px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    #profiles-list::-webkit-scrollbar {
      display: none;
    }

    .profile-btn {
      width: 40px;
      height: 40px;
      border-radius: 15px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, .08);
      background: linear-gradient(135deg, #272b35, #151821);
      color: #f0f4ff;
      font-weight: 700;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 16px;
      position: relative;
      transition: all .25s cubic-bezier(.34, 1.56, .64, 1);
      box-shadow: 0 6px 16px rgba(0, 0, 0, .22);
      flex-shrink: 0;
      overflow: hidden;
    }

    body.light-mode .profile-btn {
      background: linear-gradient(135deg, #fff, #eef3fb);
      color: #273044;
      box-shadow: 0 6px 14px rgba(35, 55, 90, .1);
    }

    .profile-btn:hover {
      transform: translateY(-2px) scale(1.06);
      border-color: rgba(10, 132, 255, .6);
      box-shadow: 0 10px 24px rgba(10, 132, 255, .22);
    }

    .profile-btn.active {
      border-color: #65b7ff;
      background: linear-gradient(135deg, #0a84ff, #5e5ce6);
      color: white;
      box-shadow: 0 0 18px rgba(10, 132, 255, .46);
    }

    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #ff375f, #ff7a45);
      color: white;
      border-radius: 999px;
      font-size: 9px;
      padding: 2px 4px;
      display: none;
      font-weight: 800;
      border: 2px solid #121620;
    }

    .sidebar-spacer {
      flex: 1;
      min-height: 8px;
    }

    .tool-btn {
      width: 36px;
      height: 36px;
      border-radius: 13px;
      background: transparent;
      border: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .22s ease;
      color: #a3a8b8;
      margin-bottom: 4px;
      padding: 0;
      position: relative;
    }

    .tool-btn:hover,
    .tool-btn.active {
      background: rgba(255, 255, 255, .12);
      color: #fff;
      transform: scale(1.06);
    }

    body.light-mode .tool-btn {
      color: #667085;
    }

    body.light-mode .tool-btn:hover,
    body.light-mode .tool-btn.active {
      background: rgba(10, 132, 255, .1);
      color: #0a64d8;
    }

    .tool-btn svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #btn-add-profile {
      border: 1.5px dashed rgba(255, 255, 255, .24);
      background: rgba(255, 255, 255, .04);
      color: #a3a8b8;
      margin-top: 10px;
    }

    #btn-add-profile:hover {
      border-color: #0a84ff;
      color: #0a84ff;
      background: rgba(10, 132, 255, .14);
      transform: scale(1.07) rotate(90deg);
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .58);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      animation: fadeIn .22s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .modal-box,
    .panel-box {
      background: linear-gradient(180deg, rgba(28, 31, 43, .92), rgba(14, 16, 24, .94));
      padding: 26px;
      border-radius: 24px;
      width: 360px;
      max-height: 86vh;
      overflow: auto;
      box-shadow: 0 22px 70px rgba(0, 0, 0, .58);
      color: white;
      border: 1px solid rgba(255, 255, 255, .1);
      backdrop-filter: blur(24px);
      animation: pop .28s cubic-bezier(.34, 1.56, .64, 1);
    }

    .panel-box {
      width: 430px;
    }

    @keyframes pop {
      from {
        transform: translateY(28px) scale(.94);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    body.light-mode .modal-box,
    body.light-mode .panel-box {
      background: rgba(255, 255, 255, .94);
      color: #172033;
      box-shadow: 0 22px 60px rgba(28, 48, 82, .15);
      border: 1px solid rgba(0, 0, 0, .07);
    }

    .modal-input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .14);
      background: rgba(0, 0, 0, .24);
      color: inherit;
      outline: none;
      margin: 10px 0 18px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
    }

    body.light-mode .modal-input {
      background: rgba(10, 20, 40, .04);
      border-color: rgba(0, 0, 0, .1);
    }

    .modal-input:focus {
      border-color: #0a84ff;
      box-shadow: 0 0 0 4px rgba(10, 132, 255, .15);
    }

    .modal-btn {
      padding: 11px 18px;
      border-radius: 12px;
      border: 0;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: all .22s ease;
      font-family: inherit;
    }

    .modal-btn.cancel {
      background: rgba(255, 255, 255, .1);
      color: inherit;
    }

    .modal-btn.save {
      background: linear-gradient(135deg, #0a84ff, #5e5ce6);
      color: white;
      margin-left: 10px;
      box-shadow: 0 8px 18px rgba(10, 132, 255, .28);
    }

    .modal-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .panel-title {
      margin: 0;
      font-size: 20px;
    }

    .download-item {
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: 16px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, .05);
    }

    body.light-mode .download-item {
      border-color: rgba(0, 0, 0, .07);
      background: rgba(10, 30, 60, .04);
    }

    .download-name {
      font-weight: 800;
      font-size: 13px;
      word-break: break-word;
    }

    .download-meta {
      color: #9aa3b8;
      font-size: 12px;
      margin: 5px 0 8px;
    }

    .progress {
      height: 7px;
      background: rgba(255, 255, 255, .1);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress>span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #0a84ff, #30d158);
      width: 0%;
      transition: width .2s;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    #lock-overlay {
      background: radial-gradient(circle at top left, rgba(10, 132, 255, .24), transparent 35%), rgba(4, 6, 12, .82);
    }

    #lock-overlay .modal-box {
      text-align: center;
    }
  </style>
</head>

<body class="dark-mode">
  <div id="sidebar">
    <div id="profiles-list"></div>
    <button class="profile-btn" id="btn-add-profile" title="Thêm tài khoản"><svg viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg></button>
    <div class="sidebar-spacer"></div>
    <button class="tool-btn" id="btn-lock" title="Khóa ứng dụng"><svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg></button>
    <button class="tool-btn" id="btn-shield" title="ZaDark Shield"><svg viewBox="0 0 24 24">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      </svg></button>
    <button class="tool-btn" id="btn-dark-mode" title="Chế độ tối/sáng"><svg id="icon-moon" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg><svg id="icon-sun" style="display:none;" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
      </svg></button>
    <button class="tool-btn" id="btn-zoom-in" title="Phóng to"><svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
        <line x1="11" y1="8" x2="11" y2="14" />
        <line x1="8" y1="11" x2="14" y2="11" />
      </svg></button>
    <button class="tool-btn" id="btn-zoom-out" title="Thu nhỏ"><svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
        <line x1="8" y1="11" x2="14" y2="11" />
      </svg></button>
    <button class="tool-btn" id="btn-fs" title="Toàn màn hình"><svg viewBox="0 0 24 24">
        <polyline points="15 3 21 3 21 9" />
        <polyline points="9 21 3 21 3 15" />
        <line x1="21" y1="3" x2="14" y2="10" />
        <line x1="3" y1="21" x2="10" y2="14" />
      </svg></button>
    <button class="tool-btn" id="btn-pin" title="Ghim cửa sổ"><svg viewBox="0 0 24 24">
        <path d="M12 17v5" />
        <path
          d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6a1 1 0 0 1 1-1h.5a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5H8a1 1 0 0 1 1 1z" />
      </svg></button>
    <button class="tool-btn" id="btn-reload" title="Tải lại trang"><svg viewBox="0 0 24 24">
        <polyline points="23 4 23 10 17 10" />
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
      </svg></button>
    <button class="tool-btn" id="btn-quick-replies" title="Tin nhắn mẫu"><svg viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        <line x1="9" y1="10" x2="15" y2="10" />
      </svg></button>
    <button class="tool-btn" id="btn-update" title="Cập nhật"><svg viewBox="0 0 24 24">
        <path d="M21 2v6h-6" />
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
        <path d="M3 22v-6h6" />
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
      </svg></button>
  </div>

  <div id="quick-replies-overlay" class="overlay">
    <div class="panel-box" style="width:480px;">
      <div class="panel-head">
        <h3 class="panel-title">💬 Tin nhắn mẫu</h3><button class="modal-btn cancel"
          id="quick-replies-close">Đóng</button>
      </div>
      <p class="download-meta">Tạo tin nhắn mẫu, nhập <code
          style="background:rgba(10,132,255,.2);color:#65b7ff;padding:2px 6px;border-radius:6px;font-size:12px;">/1</code>
        <code
          style="background:rgba(10,132,255,.2);color:#65b7ff;padding:2px 6px;border-radius:6px;font-size:12px;">/2</code>
        ... trong khung chat rồi nhấn Enter để gửi.
      </p>
      <div id="quick-replies-list" style="max-height:320px;overflow-y:auto;margin-bottom:14px;"></div>
      <div style="display:flex;gap:10px;align-items:flex-end;"><textarea id="quick-reply-input" class="modal-input"
          placeholder="Nhập nội dung tin nhắn mẫu..."
          style="margin:0;resize:vertical;min-height:48px;max-height:120px;flex:1;"></textarea><button
          class="modal-btn save" id="quick-reply-add" style="height:48px;flex-shrink:0;">Thêm</button></div>
    </div>
  </div>

  <div id="modal-overlay" class="overlay">
    <div class="modal-box">
      <h3 id="modal-title" style="margin-top:0;">Thêm tài khoản</h3>
      <div style="display:flex;align-items:center;gap:12px;margin-top:16px;">
        <div id="avatar-preview"
          style="width:56px;height:56px;border-radius:18px;background:#303544;cursor:pointer;display:flex;justify-content:center;align-items:center;overflow:hidden;border:1px solid rgba(255,255,255,.1);">
          <span id="avatar-letter" style="font-size:24px;font-weight:bold;">+</span><img id="avatar-img"
            style="width:100%;height:100%;object-fit:cover;display:none;" />
        </div>
        <div style="font-size:13px;color:#9aa3b8;cursor:pointer;"
          onclick="document.getElementById('avatar-input').click()">Chọn ảnh đại diện<br />(Tùy chọn)</div><input
          type="file" id="avatar-input" accept="image/*" style="display:none;" />
      </div><input type="text" id="profile-name-input" class="modal-input"
        placeholder="Tên hiển thị (để trống = tự lấy)" /><input type="text" id="profile-proxy-input" class="modal-input"
        placeholder="Proxy: ip:port hoặc ip:port:user:pass" /><select id="profile-platform-input" class="modal-input"
        style="cursor:pointer;">
        <option value="zalo">💬 Zalo</option>
        <option value="telegram">✈️ Telegram</option>
        <option value="messenger">💙 Messenger</option>
        <option value="fanpage">🚩 FB Fanpage</option>
        <option value="whatsapp">💚 WhatsApp</option>
        <option value="teams">🟣 Microsoft Teams</option>
        <option value="gmail">📧 Google / Gmail</option>
      </select>
      <div style="display:flex;justify-content:space-between;align-items:center;"><button class="modal-btn cancel"
          id="modal-delete" style="background:#ff453a;color:white;display:none;">Xóa</button>
        <div style="margin-left:auto;"><button class="modal-btn cancel" id="modal-cancel">Hủy</button><button
            class="modal-btn save" id="modal-save">Lưu</button></div>
      </div>
    </div>
  </div>
  <div id="update-overlay" class="overlay">
    <div class="panel-box">
      <div class="panel-head">
        <h3 class="panel-title">Cập nhật ứng dụng</h3><button class="modal-btn cancel" id="update-close">Đóng</button>
      </div>
      <p id="update-status" class="download-meta">Sẵn sàng kiểm tra cập nhật.</p>
      <div class="progress"><span id="update-progress"></span></div>
      <div style="margin-top:16px;text-align:right;"><button class="modal-btn cancel" id="update-check">Kiểm
          tra</button><button class="modal-btn save" id="update-download" style="display:none;">Tải
          xuống</button><button class="modal-btn save" id="update-install" style="display:none;">Cài đặt</button></div>
    </div>
  </div>
  <div id="lock-overlay" class="overlay">
    <div class="modal-box">
      <h2 style="margin-top:0;">🔒 Khóa ứng dụng</h2>
      <p id="lock-hint" class="download-meta">Nhập mật khẩu để mở khóa.</p><input type="password" id="lock-password"
        class="modal-input" placeholder="Mật khẩu" /><input type="password" id="lock-password-confirm"
        class="modal-input" placeholder="Nhập lại mật khẩu" style="display:none;" /><button class="modal-btn save"
        id="lock-submit">Mở khóa</button>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>

</html>
